<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LeadFlow"/>
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuKaluG4j8KgTGVhZHMiLAogICJzaG9ydF9uYW1lIjogIkxlYWRzIiwKICAiaWNvbnMiOiBbXSwKICAic3RhcnRfdXJsIjogIi8iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJ0aGVtZV9jb2xvciI6ICIjMmI2Y2IwIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjBmNGY4Igp9">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="/favicon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<title>LeadFlow</title>
<style>
:root{--bg:#dbe7f4;--panel:#ffffff;--panel-soft:#eaf1f8;--text:#0d1b2d;--muted:#4c5e74;--line:#8ea4be;--line-strong:#5f7998;--brand:#133d7a;--brand-dark:#0a2347;--brand-soft:#dfeaff;--success:#0f766e;--success-soft:#e8f7f2;--warning:#a14e06;--warning-soft:#fff2df;--danger:#b42318;--danger-soft:#fff0ef;--shadow:0 16px 36px rgba(12,27,45,.16);--shadow-soft:0 8px 22px rgba(12,27,45,.12);--radius-xl:24px;--radius-lg:18px;--radius-md:14px}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#d8e4f3 0%,#ecf3fb 40%,#dce7f4 100%);color:var(--text)}
body::before{content:"";position:fixed;inset:-15% auto auto -8%;width:260px;height:260px;background:radial-gradient(circle,rgba(19,61,122,.16),transparent 72%);pointer-events:none;z-index:0}
body::after{content:"";position:fixed;inset:auto -10% 8% auto;width:300px;height:300px;background:radial-gradient(circle,rgba(79,143,219,.18),transparent 72%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 16px 36px}
.hero-banner{position:relative;overflow:hidden;background:linear-gradient(145deg,#081a38 0%,#123f7a 54%,#2c69bb 100%);color:#fff;padding:28px 22px 22px;border-radius:0 0 28px 28px;margin-bottom:16px;box-shadow:var(--shadow)}
.hero-banner::after{content:"";position:absolute;inset:auto -12% -34% auto;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 68%)}
.hero-banner h1{position:relative;margin:0 0 6px;font-size:30px;font-weight:800;letter-spacing:-.02em}
.hero-banner .sub{position:relative;opacity:.96;font-size:14px;max-width:520px;line-height:1.45}
.hero-meta{position:relative;color:rgba(255,255,255,.92);font-size:13px;font-weight:700;margin-top:6px;text-shadow:0 1px 2px rgba(0,0,0,.18)}
.banner-row{position:relative;display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap;margin-top:12px}
.status-note{display:inline-flex;align-items:center;font-size:13px;font-weight:700;color:#eef4fb;background:rgba(8,26,56,.18);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px}
.sync-link{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.14)!important;color:#fff!important;border:1px solid rgba(255,255,255,.22)!important;box-shadow:none!important}
.sync-link:hover{background:rgba(255,255,255,.2)!important}
.panel-actions{display:flex;justify-content:flex-end;margin-top:12px}
.text-link{border:none;background:transparent;color:var(--brand);font-size:13px;font-weight:700;padding:0;cursor:pointer}
.text-link:hover{text-decoration:underline;transform:none}
.auth-panel,.notice,.tabs,.controls,.row{background:var(--panel)}
.auth-panel{border:2px solid var(--line-strong);border-radius:var(--radius-xl);padding:16px;box-shadow:var(--shadow-soft);margin-bottom:14px;background:linear-gradient(180deg,#ffffff 0%,#f6f9fd 100%)}
.auth-panel[hidden],.notice[hidden]{display:none!important}
.auth-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.auth-row input{flex:1;min-width:220px}
button{font:inherit}
.btn{border:none;border-radius:14px;padding:11px 15px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,background .16s ease}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,#0f3570,#184d9d);color:#fff;box-shadow:0 10px 24px rgba(19,61,122,.28)}
.btn-secondary{background:#e6eef8;color:var(--brand-dark);border:1px solid var(--line)}
.btn-danger{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5;box-shadow:0 8px 16px rgba(153,27,27,.12)}
.notice{border:2px solid #d28a54;border-radius:16px;padding:12px 14px;margin-bottom:14px;font-size:14px;box-shadow:var(--shadow-soft);background:#fff7ef}
.tabs{display:flex;gap:6px;margin-bottom:14px;padding:5px;border-radius:18px;border:2px solid var(--line-strong);box-shadow:var(--shadow-soft);background:linear-gradient(180deg,#ffffff 0%,#edf3f9 100%)}
.tab{flex:1;padding:12px 14px;text-align:center;border-radius:14px;cursor:pointer;font-weight:800;font-size:15px;background:transparent;border:none;color:var(--muted);transition:all .16s ease}
.tab.active{background:linear-gradient(135deg,#0f3670,#1a4e9d);color:#fff;box-shadow:0 8px 20px rgba(15,54,112,.24)}
.actioned-count{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 8px;margin-left:8px;border-radius:999px;background:rgba(255,255,255,.18);font-size:12px}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;padding:12px;border-radius:18px;border:2px solid var(--line-strong);box-shadow:var(--shadow-soft);background:linear-gradient(180deg,#ffffff 0%,#edf3f9 100%)}
.search-controls{border-color:#315983;background:linear-gradient(180deg,#f7fbff 0%,#e6eef9 100%)}
.filter-controls{border-color:#4d627c;background:linear-gradient(180deg,#f8fafc 0%,#e8eef5 100%)}
.control-block{display:grid;gap:7px}
.control-label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--brand-dark);padding-left:2px}
.filter-controls .control-label{color:#334155}
input,select,textarea{width:100%;padding:13px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;font:inherit;font-size:15px;color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.85)}
.search-controls input,.search-controls select{border-color:#7d9cc2;background:#fff}
.filter-controls select{border-color:#8698ad;background:#fff}
input::placeholder,textarea::placeholder{color:#6d7f95}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2d67bd;box-shadow:0 0 0 4px rgba(45,103,189,.18)}
.list{display:grid;gap:14px}
.row{border-radius:22px;padding:18px;border:2px solid var(--line-strong);box-shadow:var(--shadow-soft);border-left:8px solid var(--brand);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%)}
.row:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(12,27,45,.12);border-color:#355a84}
.row.urgent-row{border-left-color:#dc2626}.row.medium-row{border-left-color:#d97706}.row.low-row{border-left-color:#059669}
.row.actioned-row{opacity:1;background:linear-gradient(180deg,#f8fbff 0%,#eef3f8 100%);border-left-color:#6b7280}
.row.actioned-row .comment-box{background:#fff;border:1px solid #b8cbbe}
.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}
.lead-heading{display:grid;gap:4px}.name{font-weight:800;font-size:20px;color:#102f58;letter-spacing:-.02em}
.meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.meta-sep{opacity:.55}.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;font-size:12px;padding:6px 11px;border-radius:999px;font-weight:800;border:1px solid transparent}
.priority-pill{box-shadow:inset 0 -1px 0 rgba(255,255,255,.35)}
.urgent{background:#fee2e2;color:#991b1b;border-color:#fca5a5}.medium{background:#fef3c7;color:#92400e;border-color:#fbbf24}.low{background:#dcfce7;color:#166534;border-color:#86efac}
.source-jgms{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}.source-fla{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}.source-ntr{background:#ccfbf1;color:#0f766e;border-color:#5eead4}.type-pill{background:#edf2f8;color:#334155;border-color:#cfd9e5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;margin:12px 0}
.field{font-size:14px;padding:11px 12px;background:linear-gradient(180deg,#f9fbfe 0%,#eef4fa 100%);border:2px solid #c0d0df;border-radius:16px;min-height:72px}
.field strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#5d6f86;margin-bottom:6px;font-weight:800}
.summary-field{background:linear-gradient(180deg,#eef4ff 0%,#dde8fb 100%);border-color:#bfd2f4;margin-top:6px}.summary-field strong{color:#375277}
.unknown{color:#7f91a6}a.contact-link{color:var(--brand);text-decoration:none;font-weight:800}a.contact-link:hover{text-decoration:underline}
.actions{display:flex;gap:10px;margin:14px 0 0;flex-wrap:wrap}.actions a{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-width:132px;padding:11px 16px;border-radius:14px;text-decoration:none;font-size:14px;font-weight:800;box-shadow:0 8px 16px rgba(12,27,45,.08)}
.btn-call{background:#dcfce7;color:#166534;border:1px solid #86efac}.btn-sms{background:#ecfccb;color:#3f6212;border:1px solid #bef264}.btn-email{background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd}
.leap-row{display:flex;flex-wrap:nowrap;align-items:center;gap:8px;margin-top:14px;padding:10px;background:linear-gradient(180deg,#f5fbf7 0%,#e9f7ef 100%);border:2px solid #8db6a0;border-radius:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.leap-row::-webkit-scrollbar{display:none}
.leap-item{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;padding:8px 10px;border-radius:12px;background:#fff;border:2px solid #c7ddcf;flex:0 0 auto}
.leap-row input[type=checkbox]{width:18px;height:18px;accent-color:#059669;flex:0 0 auto;margin:0}.leap-row label{font-size:12px;font-weight:800;color:#065f46;white-space:nowrap}.actioned-item label{color:#047857!important}
.comment-wrap{margin-top:12px}.comment-wrap strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#5d6f86;margin:0 0 6px;font-weight:800}
.comment-box{min-height:76px;resize:vertical;margin-top:0;background:#fff}
.empty{padding:28px 18px;text-align:center;color:#52657d;background:#fff;border:2px dashed var(--line-strong);border-radius:20px}
.muted{color:var(--muted);font-size:13px}.loading{padding:24px;text-align:center;color:var(--muted)}
@media(max-width:640px){.wrap{padding:0 12px 28px}.hero-banner{padding:24px 18px 20px;border-radius:0 0 24px 24px}.hero-banner h1{font-size:28px}.tabs{padding:4px}.tab{font-size:14px;padding:11px 10px}.controls,.grid{grid-template-columns:1fr}.row{padding:16px;border-radius:20px}.top{flex-direction:column;align-items:flex-start}.actions a{flex:1}.meta{gap:6px}.leap-row{gap:8px}}
.inbox-card{border-radius:22px;padding:18px;border:2px solid var(--line-strong);border-left:8px solid #2563eb;box-shadow:var(--shadow-soft);background:linear-gradient(180deg,#eff6ff 0%,#dbeafe 60%,#e8f1fb 100%);transition:transform .18s ease,box-shadow .18s ease;margin:0}
.inbox-card:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(12,27,45,.13);border-color:#3b82f6}
.inbox-card.inbox-urgent{border-left-color:#dc2626;background:linear-gradient(180deg,#fff5f5 0%,#fee2e2 60%,#fde8e8 100%)}
.inbox-from{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.inbox-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#60a5fa);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex:0 0 auto;box-shadow:0 4px 10px rgba(29,78,216,.22)}
.inbox-from-details{flex:1;min-width:0}
.inbox-from-name{font-weight:800;font-size:17px;color:#102f58}
.inbox-from-addr{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inbox-subject{font-weight:800;font-size:15px;color:var(--text);margin-bottom:7px}
.inbox-snippet{font-size:13px;color:#4c5e74;line-height:1.55;margin-bottom:10px}
.inbox-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px;align-items:center}
.inbox-meta-pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-weight:800;font-size:11px;background:#e0eaff;color:#1e40af;border:1px solid #bfdbfe}
.btn-import{background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:14px;padding:11px 20px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 8px 16px rgba(29,78,216,.22);transition:transform .16s ease,box-shadow .16s ease}
.btn-import:hover{transform:translateY(-1px);box-shadow:0 12px 22px rgba(29,78,216,.28)}
.btn-dismiss{background:#f1f5f9;color:#475569;border:2px solid #cbd5e1;border-radius:14px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .16s ease,background .16s ease}
.btn-dismiss:hover{transform:translateY(-1px);background:#e2e8f0;border-color:#94a3b8}
.inbox-empty{padding:32px 18px;text-align:center;color:#52657d;background:#fff;border:2px dashed #93c5fd;border-radius:20px}
.inbox-header{font-size:13px;color:var(--muted);margin-bottom:12px;padding:8px 12px;background:rgba(219,234,254,.4);border-radius:12px;border:1px solid #bfdbfe;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.inbox-header strong{color:#1d4ed8}
.inbox-dismissed{opacity:.55;filter:grayscale(.35)}
.inbox-dismissed-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:800;background:#e2e8f0;color:#64748b;border:1px solid #cbd5e1;margin-left:auto;flex-shrink:0}
.inbox-dismissed-controls{display:flex;justify-content:center;margin-top:14px}
.inbox-toggle-dismissed{background:#f8fafc;color:#475569;border:2px solid #cbd5e1;border-radius:14px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:background .16s ease,border-color .16s ease;white-space:nowrap;margin-left:auto;flex-shrink:0}
.inbox-toggle-dismissed:hover{background:#e2e8f0;border-color:#94a3b8}
.btn-undismiss{background:#f8fafc;color:#475569;border:2px solid #cbd5e1;border-radius:14px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .16s ease,background .16s ease}
.btn-undismiss:hover{transform:translateY(-1px);background:#e2e8f0;border-color:#94a3b8}
</style>
</head>
<body>
<div class="hero-banner">
  <h1>&#9878;&#65039; LeadFlow</h1>
  <div class="sub" id="heroSub">Loading lead range...</div>
  <div class="hero-meta" id="lastUpdatedLine">Last updated: checking…</div>
  <div class="banner-row">
    <span class="status-note" id="syncStatusLine" hidden>Saved on this phone</span>
  </div>
</div>
<div class="wrap">
  <div class="auth-panel" id="authPanel" hidden>
    <div class="auth-row">
      <input id="authEmail" type="email" placeholder="Email for sign-in link" autocomplete="email"/>
      <button class="btn btn-primary" id="sendMagicLinkBtn">Email sign-in link</button>
      <button class="btn btn-secondary" id="signOutBtn" hidden>Sign out</button>
    </div>
    <div class="muted" id="authStatus">Sign in once to sync across phone and laptop. On iPhone, open the magic link in Safari and keep using Safari for the tracker.</div>
  </div>

  <div class="notice" id="notice" hidden></div>

  <div class="tabs">
    <button class="tab active" data-tab="active">Active</button>
    <button class="tab" data-tab="actioned">Actioned</button>
    <button class="tab" data-tab="inbox">Inbox</button>
  </div>

  <div class="controls search-controls">
    <div class="control-block">
      <label class="control-label" for="search">Search</label>
      <input id="search" placeholder="&#128269; Search name, matter, source"/>
    </div>
    <div class="control-block">
      <label class="control-label" for="sourceFilter">Source</label>
      <select id="sourceFilter"><option value="all">All sources</option></select>
    </div>
  </div>
  <div class="controls filter-controls">
    <div class="control-block">
      <label class="control-label" for="dateFilter">Time</label>
      <select id="dateFilter">
        <option value="all" selected>All time</option>
        <option value="7">Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
    </div>
    <div class="control-block">
      <label class="control-label" for="urgencyFilter">Urgency</label>
      <select id="urgencyFilter">
        <option value="all">All urgency</option>
        <option value="URGENT">Urgent only</option>
        <option value="MEDIUM">Medium only</option>
        <option value="LOW">Low only</option>
      </select>
    </div>
  </div>

  <div class="list" id="list"><div class="loading">Loading leads…</div></div>
  <div class="empty" id="emptyState" hidden>No leads match the current filters.</div>
  <div class="panel-actions">
    <a class="text-link" id="updateNowLink" href="./?update=1">Update tracker now</a>
    <button class="text-link" id="showAuthBtn" hidden>Sync settings</button>
  </div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
